<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#1a1216">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Little by Little</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- Lock Screen -->
  <div id="lock-screen" class="view">
    <div class="lock-ambient"></div>
    <div class="lock-content">
      <div class="lock-brand">
        <div class="lock-icon">
          <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
            <rect x="4" y="8" width="40" height="32" rx="8" stroke="currentColor" stroke-width="2.5" fill="none"/>
            <path d="M14 24h20M14 30h12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
            <circle cx="36" cy="16" r="6" fill="url(#lockIconGrad)"/>
            <defs>
              <linearGradient id="lockIconGrad" x1="30" y1="10" x2="42" y2="22">
                <stop stop-color="#FF6B6B"/>
                <stop offset="1" stop-color="#FDCB6E"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <h1 class="lock-title">Little by<br><span>Little</span></h1>
        <p class="lock-subtitle" id="lock-subtitle">Enter your password to continue</p>
      </div>
      <form id="lock-form" class="lock-form" autocomplete="off">
        <div class="input-wrapper">
          <input
            type="password"
            id="lock-input"
            class="lock-input"
            placeholder="Password"
            autocomplete="current-password"
            required
          >
          <div class="input-glow"></div>
        </div>
        <button type="submit" id="lock-btn" class="lock-btn">
          <span id="lock-btn-text">Unlock</span>
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <path d="M4 10h12m-4-4 4 4-4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <p class="lock-error" id="lock-error"></p>
      </form>
    </div>
  </div>

  <!-- Feed View -->
  <div id="feed-view" class="view" hidden>
    <header class="view-header">
      <h2 class="view-title">Feed</h2>
      <div class="header-accent"></div>
    </header>
    <main class="view-content feed-content" id="feed-content">
      <div class="feed-placeholder">
        <div class="placeholder-icon">
          <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
            <rect x="8" y="12" width="48" height="40" rx="10" stroke="currentColor" stroke-width="2.5" opacity="0.3"/>
            <rect x="14" y="18" width="36" height="28" rx="7" stroke="currentColor" stroke-width="2" opacity="0.5"/>
            <path d="M26 36l4-6 4 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.4"/>
          </svg>
        </div>
        <p>Cards loading...</p>
      </div>
    </main>
  </div>

  <!-- Library View -->
  <div id="library-view" class="view" hidden>
    <header class="view-header">
      <h2 class="view-title">Library</h2>
      <div class="header-accent"></div>
    </header>
    <main class="view-content library-content" id="library-content">
      <div class="library-placeholder">
        <div class="placeholder-icon">
          <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
            <path d="M16 12h8l4 4h20a4 4 0 014 4v28a4 4 0 01-4 4H16a4 4 0 01-4-4V16a4 4 0 014-4z" stroke="currentColor" stroke-width="2.5" opacity="0.3"/>
            <path d="M24 34h16M24 40h10" stroke="currentColor" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
          </svg>
        </div>
        <p>Saved cards will appear here</p>
      </div>
    </main>
  </div>

  <!-- Bottom Navigation -->
  <nav id="bottom-nav" class="bottom-nav" hidden>
    <a href="#feed" class="nav-tab active" data-view="feed" aria-label="Feed">
      <div class="nav-tab-indicator"></div>
      <svg class="nav-icon" width="24" height="24" viewBox="0 0 24 24" fill="none">
        <rect x="3" y="3" width="8" height="10" rx="2" stroke="currentColor" stroke-width="2"/>
        <rect x="13" y="3" width="8" height="6" rx="2" stroke="currentColor" stroke-width="2"/>
        <rect x="3" y="15" width="8" height="6" rx="2" stroke="currentColor" stroke-width="2"/>
        <rect x="13" y="11" width="8" height="10" rx="2" stroke="currentColor" stroke-width="2"/>
      </svg>
      <span class="nav-label">Feed</span>
    </a>
    <a href="#library" class="nav-tab" data-view="library" aria-label="Library">
      <div class="nav-tab-indicator"></div>
      <svg class="nav-icon" width="24" height="24" viewBox="0 0 24 24" fill="none">
        <path d="M4 4h4v16H4zM10 4h4v16h-4zM16 7l4-1v15l-4 1z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span class="nav-label">Library</span>
    </a>
  </nav>

  <script src="js/cards.js"></script>
  <script src="js/swipe.js"></script>
  <script src="js/library.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
